name: Sync Agentic Workflows

# Runs when aw-config.yml changes, daily (picks up updates in central-repo),
# or on manual dispatch.
#
# For each enabled workflow it creates a tiny trigger file that calls the
# compiled workflow in central-repo via workflow_call — nothing is copied.
# For disabled workflows it removes the trigger file.

on:
  push:
    branches:
      - main
    paths:
      - .github/aw-config.yml
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: Generate trigger files
        env:
          # Optional: set when central-repo is private
          CENTRAL_REPO_TOKEN: ${{ secrets.CENTRAL_REPO_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import yaml, sys, os, textwrap, urllib.request, urllib.error

          # ── Read project config ─────────────────────────────────────────────
          with open('.github/aw-config.yml') as f:
              config = yaml.safe_load(f)

          central_repo = config.get('central-repo')
          central_ref  = config.get('central-repo-ref', 'main')
          if not central_repo:
              print("ERROR: 'central-repo' not set in aw-config.yml", file=sys.stderr)
              sys.exit(1)

          # ── Fetch catalog ───────────────────────────────────────────────────
          token   = os.environ.get('CENTRAL_REPO_TOKEN', '')
          cat_url = f"https://raw.githubusercontent.com/{central_repo}/{central_ref}/catalog.yml"
          req     = urllib.request.Request(cat_url)
          if token:
              req.add_header('Authorization', f'Bearer {token}')
          try:
              with urllib.request.urlopen(req) as r:
                  catalog = yaml.safe_load(r.read())
          except urllib.error.HTTPError as e:
              print(f"ERROR: could not fetch catalog: {e}", file=sys.stderr)
              sys.exit(1)

          print(f"Central-repo : {central_repo}@{central_ref}")

          # ── Process each workflow ───────────────────────────────────────────
          os.makedirs('.github/workflows', exist_ok=True)

          for workflow, enabled in config.get('workflows', {}).items():
              trigger_file = f".github/workflows/{workflow}.yml"

              if enabled:
                  entry = catalog.get('workflows', {}).get(workflow)
                  if not entry:
                      print(f"ERROR: '{workflow}' not in catalog", file=sys.stderr)
                      sys.exit(1)

                  trigger_yaml = yaml.dump(
                      entry['trigger'], default_flow_style=False, sort_keys=False
                  ).rstrip()
                  indented = '\n'.join(f"  {l}" for l in trigger_yaml.splitlines())
                  desc = entry.get('description', workflow).strip().splitlines()[0][:72]

                  content = textwrap.dedent(f"""\
                      # AUTO-GENERATED by sync-agentic-workflows — DO NOT EDIT
                      # To disable: set '{workflow}: false' in .github/aw-config.yml

                      name: "{desc}"

                      "on":
                      {indented}

                      jobs:
                        run:
                          uses: {central_repo}/.github/workflows/{workflow}.lock.yml@{central_ref}
                          secrets: inherit
                  """)

                  with open(trigger_file, 'w') as f:
                      f.write(content)
                  print(f"  [enable]  {workflow}  →  {trigger_file}")

              else:
                  if os.path.exists(trigger_file):
                      os.remove(trigger_file)
                      print(f"  [disable] {workflow}  (removed)")
                  else:
                      print(f"  [disable] {workflow}  (already absent)")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          if git diff --staged --quiet; then
            echo "No trigger file changes."
          else
            git commit -m "chore(aw): sync trigger files from central-repo"
            git push
          fi
