# Central catalog of available agentic workflows.
#
# Compiled lock files live in .github/workflows/ of this repo and are
# called by project repos via GitHub Actions workflow_call — nothing is
# copied to the project. The sync-agentic-workflows workflow in each
# project only creates/removes a tiny trigger file per enabled workflow.
#
# To add a new workflow:
#   1. Add the .md source under .github/workflows/ (with workflow_call in on:)
#   2. Run: gh aw compile  (generates the .lock.yml)
#   3. Register it in this catalog with its trigger conditions

version: "1"

workflows:
  pr-documentation-review:
    description: >
      Reviews codebase documentation whenever a pull request is opened,
      checking for missing, outdated, or incomplete docs and posting a
      review comment.
    trigger:
      pull_request:
        types: [opened]

  daily-repo-status:
    description: >
      Creates daily repo status reports. Gathers recent repository activity
      (issues, PRs, discussions, releases, code changes) and generates
      GitHub issues with productivity insights and recommendations.
    trigger:
      schedule:
        - cron: "28 12 * * *"
      workflow_dispatch:
